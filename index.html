<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Detection - Serverless</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.2/pose.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full bg-gray-800 p-8 rounded-xl shadow-2xl text-center border border-gray-700">
        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
            PoseSkeleton AI
        </h1>
        <p class="text-gray-400 text-sm mb-6">Upload a local video file to track and project human poses directly in your browser.</p>

        <div id="dropzone" class="border-2 border-dashed border-gray-600 rounded-lg p-6 hover:border-blue-500 transition cursor-pointer relative bg-gray-900/50 mb-6">
            <input type="file" id="videoInput" accept="video/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
            <div class="space-y-2" id="dropzoneText">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <p class="text-sm text-gray-300 font-medium">Click or drag video file to process</p>
            </div>
            <p id="fileName" class="text-sm text-blue-400 font-semibold hidden"></p>
        </div>

        <div class="relative w-full max-w-xl mx-auto hidden bg-black rounded-lg overflow-hidden border border-gray-700" id="videoContainer">
            <video id="inputVideo" class="hidden" controls muted playsinline></video>
            <canvas id="outputCanvas" class="w-full h-auto block"></canvas>
        </div>
        
        <p id="statusMsg" class="mt-4 text-sm text-gray-400 hidden"></p>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const inputVideo = document.getElementById('inputVideo');
        const outputCanvas = document.getElementById('outputCanvas');
        const canvasCtx = outputCanvas.getContext('2d');
        const videoContainer = document.getElementById('videoContainer');
        const dropzoneText = document.getElementById('dropzoneText');
        const fileNameElement = document.getElementById('fileName');
        const statusMsg = document.getElementById('statusMsg');

        // Pinned to stable @0.2 path to avoid version mismatch errors
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.2/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            canvasCtx.drawImage(results.image, 0, 0, outputCanvas.width, outputCanvas.height);

            if (results.poseLandmarks) {
                // Uses standard MediaPipe window drawing helpers safely
                window.drawConnectors(canvasCtx, results.poseLandmarks, window.POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                window.drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
            }
            canvasCtx.restore();
        });

        videoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileNameElement.textContent = `Processing: ${file.name}`;
            fileNameElement.classList.remove('hidden');
            dropzoneText.classList.add('hidden');
            statusMsg.classList.remove('hidden');
            statusMsg.textContent = "Initializing AI tracking...";

            const fileURL = URL.createObjectURL(file);
            inputVideo.src = fileURL;

            inputVideo.onloadeddata = () => {
                outputCanvas.width = inputVideo.videoWidth;
                outputCanvas.height = inputVideo.videoHeight;
                videoContainer.classList.remove('hidden');
                statusMsg.textContent = "Tracking motion coordinates live...";
                inputVideo.play();
                updateFrame();
            };
        });

        async function updateFrame() {
            if (!inputVideo.paused && !inputVideo.ended) {
                try {
                    await pose.send({ image: inputVideo });
                } catch (err) {
                    console.error("Frame skip context:", err);
                }
                requestAnimationFrame(updateFrame);
            } else if (inputVideo.ended) {
                statusMsg.textContent = "Finished processing!";
            }
        }
    </script>
</body>
</html>
