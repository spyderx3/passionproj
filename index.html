<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Detection Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-xl shadow-2xl text-center border border-gray-700">
        <h1 class="text-3xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
            PoseSkeleton AI
        </h1>
        <p class="text-gray-400 text-sm mb-6">Upload a video to overlay a motion tracking skeleton.</p>

        <form id="uploadForm" class="space-y-4">
            <div class="border-2 border-dashed border-gray-600 rounded-lg p-6 hover:border-blue-500 transition cursor-pointer relative bg-gray-900/50">
                <input type="file" name="video" accept="video/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" id="videoInput">
                <div class="space-y-2" id="dropzoneText">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    <p class="text-sm text-gray-300 font-medium">Click or drag video file to upload</p>
                </div>
                <p id="fileName" class="text-sm text-blue-400 font-semibold hidden"></p>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition transform active:scale-95 shadow-lg">
                Generate Skeleton Video
            </button>
        </form>

        <div id="loading" class="hidden mt-6 space-y-3">
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mx-auto"></div>
            <p class="text-sm text-gray-400 animate-pulse">AI is processing your video...</p>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('videoInput');
        const fileNameElement = document.getElementById('fileName');
        const dropzoneText = document.getElementById('dropzoneText');
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');

        // Change this URL to your deployed backend URL when you launch live!
        const BACKEND_URL = "https://passionprojbackend.onrender.com";

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameElement.textContent = `Selected: ${e.target.files[0].name}`;
                fileNameElement.classList.remove('hidden');
                dropzoneText.classList.add('hidden');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loading.classList.remove('hidden');

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Processing failed');

                // Convert response to a downloadable file blob
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = "skeleton_" + fileInput.files[0].name;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (error) {
                alert("An error occurred during processing.");
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
